name: Build and Push Image

on:
  schedule:
    # Keep code scanning results fresh even when there are no build/** changes.
    - cron: '0 6 * * 1'
  push:
    branches:
      - main
      - dev
    paths:
      - .github/workflows/build.yaml
      - build/**
  pull_request:
    paths:
      - .github/workflows/build.yaml
      - build/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      meta_tags: ${{ steps.tags.outputs.meta_tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          echo "version=$(cat build/VERSION)" >> "$GITHUB_OUTPUT"

      - name: Set Docker tags
        id: tags
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          {
            echo "meta_tags<<EOF"
            echo "type=raw,value=${VERSION}"
            if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
              echo "type=raw,value=latest"
            fi
            if [[ "${GITHUB_REF}" == refs/heads/* ]]; then
              echo "type=ref,event=branch"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  docker:
    needs: prepare
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    uses: Enucatl/docker-compose-security-baseline/.github/workflows/docker-ci.yml@main
    with:
      image_name: ghcr.io/enucatl/protonmail-bridge
      version: ${{ needs.prepare.outputs.version }}
      meta_tags: ${{ needs.prepare.outputs.meta_tags }}
      context: ./build
      dockerfile: Dockerfile
      platforms: linux/amd64
      push: ${{ github.event_name != 'pull_request' }}
    secrets: inherit
